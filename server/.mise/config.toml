[env]
PROJECT = "inkarta"
DATABASE_FILE = "{{env.PROJECT}}.db"
DATABASE_URL = "sqlite://{{env.PROJECT}}.db"
DEPLOY_HOST = "pi@192.168.1.5"
DEPLOY_PATH = "/home/pi/{{env.PROJECT}}/"
DEPLOY_TARGET = "aarch64-unknown-linux-gnu"
ENABLE_AUTORELOAD = 1
HOST = "127.0.0.1"
PORT = 9000
RUST_LOG = "inkarta=debug"

[tasks.serve]
run = ["cargo run"]

[tasks.develop]
run = ["mise watch serve --restart --watch src/"]
